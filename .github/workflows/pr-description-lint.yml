name: PR Description Lint

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  pr-description-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check required PR headings
        shell: bash
        run: |
          body_file="$(mktemp)"
          jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH" > "$body_file"

          missing=0
          headings=(
            "## Context"
            "## Summary"
            "## Changed Files"
            "## Validation"
            "## Known Failures / Drift"
            "## Review Notes / Residual Risks"
            "## Agent Workflow Checklist"
          )

          for heading in "${headings[@]}"; do
            if ! grep -Fq "$heading" "$body_file"; then
              echo "Missing heading: $heading"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "PR description is missing required headings."
            exit 1
          fi

          echo "PR description headings check passed."
