name: Cline PR Review (Advisory)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

concurrency:
  group: cline-pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  cline-pr-review:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      checks: read
      pull-requests: write
      security-events: read

    steps:
      - name: Resolve PR number and trusted-author gate
        id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pr_number="${{ inputs.pr_number }}"
          else
            pr_number="${{ github.event.pull_request.number }}"
          fi

          pr_json="$(mktemp)"
          perm_json="$(mktemp)"

          gh pr view "${pr_number}" \
            --repo "${GITHUB_REPO}" \
            --json number,isDraft,author,labels > "${pr_json}"

          author_login="$(jq -r '.author.login // ""' "${pr_json}")"
          is_draft="$(jq -r '.isDraft' "${pr_json}")"
          has_cline_review="$(jq -r 'any(.labels[]?.name; . == "cline-review")' "${pr_json}")"

          author_permission="none"
          if [ -n "${author_login}" ] && gh api "repos/${GITHUB_REPO}/collaborators/${author_login}/permission" > "${perm_json}" 2>/dev/null; then
            author_permission="$(jq -r '.permission // "none"' "${perm_json}")"
          fi

          trusted_author="false"
          case "${author_permission}" in
            admin|maintain|write)
              trusted_author="true"
              ;;
          esac

          should_run="true"
          skip_reason="trusted collaborator with cline-review label"

          if [ "${is_draft}" = "true" ]; then
            should_run="false"
            skip_reason="PR is draft"
          elif [ "${has_cline_review}" != "true" ]; then
            should_run="false"
            skip_reason="PR is missing required cline-review label"
          elif [ "${trusted_author}" != "true" ]; then
            should_run="false"
            skip_reason="PR author is untrusted (permission=${author_permission})"
          fi

          {
            echo "number=${pr_number}"
            echo "author=${author_login}"
            echo "permission=${author_permission}"
            echo "is_draft=${is_draft}"
            echo "has_cline_review=${has_cline_review}"
            echo "trusted_author=${trusted_author}"
            echo "should_run=${should_run}"
            echo "skip_reason=${skip_reason}"
          } >> "$GITHUB_OUTPUT"

      - name: Skip advisory run
        if: ${{ steps.gate.outputs.should_run != 'true' }}
        shell: bash
        run: |
          echo "Skipping Cline advisory review: ${{ steps.gate.outputs.skip_reason }}"
          echo "PR #${{ steps.gate.outputs.number }} by @${{ steps.gate.outputs.author }}"

      - name: Checkout repository
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: bun install --frozen-lockfile

      - name: Verify Cline CLI
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: bun run cline:version

      - name: Configure Cline OpenRouter auth
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run cline:auth:openrouter

      - name: Collect deterministic PR/security context
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        id: security_context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.gate.outputs.number }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          context_file="${RUNNER_TEMP}/plaited-pr-security-context.md"
          pr_json="${RUNNER_TEMP}/plaited-pr-view.json"
          pr_checks="${RUNNER_TEMP}/plaited-pr-checks.txt"
          pr_checks_status="available"
          codeql_json="${RUNNER_TEMP}/plaited-codeql-alerts-open.json"
          codeql_err="${RUNNER_TEMP}/plaited-codeql-alerts-open.err"
          codeql_collection_status="available"
          dependabot_json="${RUNNER_TEMP}/plaited-dependabot-alerts-open.json"
          dependabot_err="${RUNNER_TEMP}/plaited-dependabot-alerts-open.err"
          dependabot_collection_status="available"
          secret_json="${RUNNER_TEMP}/plaited-secret-scanning-alerts-open.json"
          secret_err="${RUNNER_TEMP}/plaited-secret-scanning-alerts-open.err"
          secret_scanning_collection_status="available"
          changed_files="${RUNNER_TEMP}/plaited-pr-changed-files.txt"

          gh pr view "${PR_NUMBER}" \
            --repo "${GITHUB_REPO}" \
            --json number,title,state,isDraft,author,baseRefName,headRefName,files,changedFiles,additions,deletions > "${pr_json}"
          if ! gh pr checks "${PR_NUMBER}" --repo "${GITHUB_REPO}" > "${pr_checks}"; then
            pr_checks_status="unavailable"
            {
              echo "PR checks unavailable: gh pr checks failed for PR #${PR_NUMBER}."
              echo "Treat this as an unknown checks state and flag it in review findings."
            } > "${pr_checks}"
          fi

          format_unavailable_reason() {
            local err_file="$1"
            local reason
            reason="$(tr '\n' ' ' < "${err_file}" | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//' | cut -c1-120)"
            if [ -z "${reason}" ]; then
              reason="request failed"
            fi
            echo "${reason}"
          }

          if gh api "repos/${GITHUB_REPO}/code-scanning/alerts?state=open&per_page=100" > "${codeql_json}" 2> "${codeql_err}"; then
            codeql_collection_status="available"
          else
            codeql_collection_status="unavailable ($(format_unavailable_reason "${codeql_err}"))"
            echo '[]' > "${codeql_json}"
          fi

          if gh api "repos/${GITHUB_REPO}/dependabot/alerts?state=open&per_page=100" > "${dependabot_json}" 2> "${dependabot_err}"; then
            dependabot_collection_status="available"
          else
            dependabot_collection_status="unavailable ($(format_unavailable_reason "${dependabot_err}"))"
            echo '[]' > "${dependabot_json}"
          fi

          if gh api "repos/${GITHUB_REPO}/secret-scanning/alerts?state=open&per_page=100&hide_secret=true" > "${secret_json}" 2> "${secret_err}"; then
            secret_scanning_collection_status="available"
          else
            secret_scanning_collection_status="unavailable ($(format_unavailable_reason "${secret_err}"))"
            echo '[]' > "${secret_json}"
          fi

          jq -r '.files[].path' "${pr_json}" | sort -u > "${changed_files}"

          codeql_total="$(jq 'length' "${codeql_json}")"
          codeql_high_critical_total="$(
            jq '[.[] | select((.rule.security_severity_level // "") | ascii_downcase | test("^(high|critical)$"))] | length' "${codeql_json}"
          )"
          codeql_high_critical_touched="$(
            jq --rawfile changed "${changed_files}" '
              ($changed | split("\n") | map(select(length > 0))) as $changed_files
              | [
                  .[]
                  | select((.rule.security_severity_level // "") | ascii_downcase | test("^(high|critical)$"))
                  | select((.most_recent_instance.location.path // "") as $path | $changed_files | index($path))
                ]
              | length
            ' "${codeql_json}"
          )"

          dependabot_total="$(jq 'length' "${dependabot_json}")"
          dependabot_high_critical_total="$(
            jq '[.[] | select((.security_advisory.severity // "") | ascii_downcase | test("^(high|critical)$"))] | length' "${dependabot_json}"
          )"
          secret_total="$(jq 'length' "${secret_json}")"
          secret_safe_summary="$(
            jq '
              [ .[] | {
                  number,
                  state: (.state // "unknown"),
                  type: (.secret_type_display_name // .secret_type // "unknown"),
                  resolution: (.resolution // "none"),
                  url: (.html_url // .url // "")
                } ]
            ' "${secret_json}"
          )"

          {
            echo "# Deterministic PR/Security Context"
            echo
            echo "- Repository: ${GITHUB_REPO}"
            echo "- PR number: ${PR_NUMBER}"
            echo "- Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "## PR Metadata"
            echo '```json'
            jq '{number,title,state,isDraft,author: (.author.login // .author.name // "unknown"),baseRefName,headRefName,changedFiles,additions,deletions}' "${pr_json}"
            echo '```'
            echo
            echo "## Changed Files"
            sed 's/^/- /' "${changed_files}"
            echo
            echo "## PR Checks"
            echo "- PR checks collection status: ${pr_checks_status}"
            echo '```text'
            cat "${pr_checks}"
            echo '```'
            echo
            echo "## Security Facts"
            echo "- CodeQL collection status: ${codeql_collection_status}"
            echo "- Dependabot collection status: ${dependabot_collection_status}"
            echo "- Secret-scanning collection status: ${secret_scanning_collection_status}"
            echo "- CodeQL open alerts total: ${codeql_total}"
            echo "- CodeQL open high/critical alerts total: ${codeql_high_critical_total}"
            echo "- CodeQL open high/critical alerts touching changed files: ${codeql_high_critical_touched}"
            echo "- Dependabot open alerts total: ${dependabot_total}"
            echo "- Dependabot open high/critical alerts total: ${dependabot_high_critical_total}"
            echo "- Secret scanning open alerts total: ${secret_total}"
            echo "- Unavailable security facts must be treated as residual risk / review finding."
            echo
            echo "## Raw Alert Payloads"
            echo "### CodeQL"
            echo '```json'
            jq '.' "${codeql_json}"
            echo '```'
            echo
            echo "### Dependabot"
            echo '```json'
            jq '.' "${dependabot_json}"
            echo '```'
            echo
            echo "## Secret Scanning Safe Summary"
            echo '```json'
            echo "${secret_safe_summary}"
            echo '```'
          } > "${context_file}"

          echo "path=${context_file}" >> "${GITHUB_OUTPUT}"

      - name: Advisory PR review with Cline
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          PR_NUMBER: ${{ steps.gate.outputs.number }}
          SECURITY_CONTEXT_FILE: ${{ steps.security_context.outputs.path }}
          GITHUB_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          CLINE_COMMAND_PERMISSIONS: |
            {
              "allow": [
                "gh pr view *",
                "gh pr diff *",
                "gh pr checks *",
                "gh pr comment ${{ steps.gate.outputs.number }} *",
                "git log *"
              ]
            }
        run: |
          PROMPT_FILE="$(mktemp)"
          cat > "${PROMPT_FILE}" <<PROMPT
          You are an advisory GitHub PR reviewer for this repository.

          First steps (required):
          - Read and follow root AGENTS.md.
          - Read and follow .agents/skills/plaited-development/SKILL.md.

          Use GH CLI to gather PR details, changed files, and diff for PR #${PR_NUMBER}.
          Start by running:
          - gh pr view "${PR_NUMBER}" --json number,title,body,author,baseRefName,headRefName,files,additions,deletions,changedFiles
          - gh pr diff "${PR_NUMBER}"
          - gh pr checks "${PR_NUMBER}"

          Deterministic pre-collected context (authoritative for security facts) is included below.
          Do not override these deterministic facts by opinion.
          ${SECURITY_CONTEXT_FILE}
          $(cat "${SECURITY_CONTEXT_FILE}")

          Review rules:
          - Findings-first output is mandatory.
          - Order findings by severity and include file/line references.
          - If no findings, explicitly state that and list residual risks/testing gaps.
          - Keep this advisory and non-blocking; post one comment only (no approval/request-changes review state).

          You must check for Plaited-specific risks:
          - open high/critical CodeQL alerts touching changed files
          - open high/critical Dependabot alerts relevant to shipped dependencies
          - any open secret-scanning alert
          - workflow changes that weaken permissions/security posture
          - installer/useExtension bypasses
          - raw core event bypasses
          - unsupported direct OpenRouter use
          - stale skill validation claims
          - touched-file TypeScript errors mislabeled as existing drift
          - missing targeted tests
          - missing biome check --write
          - missing format-package --write package.json when package changed

          Post one advisory summary comment to the PR beginning with:
          Reviewed by Cline (advisory)
          PROMPT

          ./node_modules/.bin/cline --yolo -m minimax/minimax-m2.7 "$(cat "${PROMPT_FILE}")"

      - name: Workflow note
        if: ${{ always() }}
        shell: bash
        run: |
          echo "Cline advisory review workflow completed. This workflow does not block merge by default."
